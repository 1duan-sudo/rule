proxy-providers:
 订阅名称要删除:
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    filter: ^(?!.*(拒绝|直连|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|traffic))
    proxy: 🟢 直连
    url: 订阅地址
    override:
      additional-prefix: '机场名称'
      skip-cert-verify: true
      udp: true
global-ua: clash.meta
mixed-port: 7890
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
skip-auth-prefixes:
- 127.0.0.1/8
- ::1/128
geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 48
geox-url:
  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  mmdb: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.metadb
  geoip: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
  asn: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb
external-controller: 127.0.0.1:9090
secret: ''
external-ui: ui
external-ui-url: https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip
find-process-mode: 'off'
keep-alive-idle: 600
keep-alive-interval: 30
profile:
  store-selected: true
  store-fake-ip: true
sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
  force-domain:
  - +.v2ex.com
  skip-domain:
  - Mijia Cloud
  - dlg.io.mi.com
  - +.push.apple.com
  - +.apple.com
  - +.wechat.com
  - +.qpic.cn
  - +.qq.com
  - +.wechatapp.com
  - +.vivox.com
  - +.oray.com
  - +.sunlogin.net
tun:
  enable: true
  stack: gvisor
  mtu: 9000
  dns-hijack:
  - any:53
  - tcp://any:53
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  prefer-h3: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
  - rule-set:fakeip_filter_domain
  - rule-set:game_cn_domain
  - rule-set:bank_cn_domain
  - rule-set:wechat_domain
  - rule-set:ai_cn_domain
  - rule-set:NetEaseMusic_domain
  - rule-set:fcm_domain
  - rule-set:alibaba_domain
  - rule-set:media_cn_domain
  - rule-set:xiaomi_domain
  - rule-set:steam_cn_domain
  - rule-set:pt_cn_domain
  - rule-set:public-tracker_domain
  - rule-set:115_domain
  - rule-set:aliyun_domain
  - rule-set:direct_domain
  - rule-set:apple_cn_domain
  - rule-set:apple_firmware_domain
  - rule-set:iptv_domain
  - rule-set:private_domain
  - rule-set:cn_domain
  default-nameserver:
  - 119.29.29.29
  - 180.184.1.1
  proxy-server-nameserver:
  - https://doh.pub/dns-query
  - https://223.5.5.5/dns-query#h3=true
  direct-nameserver:
  - https://doh.pub/dns-query
  - https://223.5.5.5/dns-query#h3=true
  nameserver:
  - https://dns.google/dns-query
  - https://dns.cloudflare.com/dns-query
proxies:
- name: 🟢 直连
  type: direct
  udp: true
proxy-groups:
- name: 🚀全球代理
  type: select
  proxies:
  - 🟢手动选择
  - ♻️自动选择
  - ⚡️均衡负载
  - 🔯故障转移
  - 🎯强制直连
- name: GLOBAL
  type: select
  proxies:
  - 🚀全球代理
  - 🟢手动选择
  - ♻️自动选择
  - ⚡️均衡负载
  - 🔯故障转移
  - 🎯强制直连
  - DIRECT
- name: 🟢手动选择
  type: select
  url: https://www.gstatic.com/generate_204
  interval: 300
  lazy: true
  timeout: 5000
  max-failed-times: 5
  include-all: true
- name: 🎯强制直连
  type: select
  hidden: true
  proxies:
  - DIRECT
- name: 🎯直连策略
  type: select
  proxies:
  - 🎯强制直连
  - 🚀全球代理
  - 🟢手动选择
  - ♻️自动选择
- name: ♻️自动选择
  type: url-test
  tolerance: 1
  strategy: consistent-hashing
  url: https://www.gstatic.com/generate_204
  interval: 300
  lazy: true
  timeout: 5000
  max-failed-times: 5
  include-all: true
- name: ⚡️均衡负载
  type: load-balance
  tolerance: 1
  strategy: round-robin
  url: https://www.gstatic.com/generate_204
  interval: 300
  lazy: true
  timeout: 5000
  max-failed-times: 5
  include-all: true
- name: 🔯故障转移
  type: fallback
  tolerance: 1
  strategy: consistent-hashing
  url: https://www.gstatic.com/generate_204
  interval: 300
  lazy: true
  timeout: 5000
  max-failed-times: 5
  include-all: true
